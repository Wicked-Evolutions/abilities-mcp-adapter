name: Bug Report
description: Report a bug in this plugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: ability
    attributes:
      label: Ability Name
      description: Which ability is affected? (e.g., content/list, cache/flush-page-cache)
      placeholder: "module/ability-name"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin Version
      placeholder: "v1.0.0"
    validations:
      required: true
  - type: dropdown
    id: found-by
    attributes:
      label: Found by
      options:
        - Dev agent
        - Tester agent
        - CTO
        - J (human)
        - Gemini
        - External user
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Error messages, logs, environment details
